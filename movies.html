<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C's Movies</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    color:white;
    min-height:100vh;

    background:
        radial-gradient(circle at 20% 0%,
            rgba(77,163,255,.20),
            transparent 55%),

        radial-gradient(circle at 80% 10%,
            rgba(60,100,220,.14),
            transparent 60%),

        linear-gradient(
            to bottom,
            #151c2c,
            #111827 35%,
            #090d16 100%
        );

    background-attachment:fixed;
}

.header{

    position:sticky;
    top:0;
    z-index:100;

    display:flex;
    align-items:center;
    gap:30px;

    padding:18px 40px;

    background:rgba(8,12,18,.92);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 8px 24px rgba(0,0,0,.30),
    0 1px 0 rgba(77,163,255,.08);
}

.header::after{
    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:-20px;

    height:20px;

    pointer-events:none;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.25),
        transparent
    );
}

.logo,
.logo:visited{

    color:white;
    text-decoration:none;

    font-size:28px;
    font-weight:bold;

    display:flex;
    align-items:center;
    gap:10px;

    transition:.2s;

}

.logo:hover{

    color:#8db9ff;
    transform:scale(1.03);

}

.nav{

    display:flex;
    gap:30px;

}

.nav a{

    display:flex;
    align-items:center;
    gap:8px;

    color:white;
    text-decoration:none;

    font-size:19px;
    font-weight:bold;

    transition:.2s;

}

.nav a:hover{

    transform:scale(1.05);

}

.nav a.active{

    color:#8db9ff;

}

.search{

    background:#151515;
    border:1px solid #333;

    color:white;

    padding:10px 14px;

    border-radius:8px;

    outline:none;

}

.container{

    padding:30px 40px;

}

.page-title{

    font-size:38px;
    margin-bottom:10px;

}

.subtitle{

    color:#999;
    margin-bottom:35px;

}

.grid{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));

    gap:24px;

}

.card{

    text-decoration:none;

    color:white;

    transition:.2s;

}

.card:hover{

    transform:scale(1.03);

}

.thumb{

    width:100%;
    aspect-ratio:16/9;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #2a2a2a,
        #3d3d3d
    );

    position:relative;

}

.duration{

    position:absolute;

    right:10px;
    bottom:10px;

    background:rgba(0,0,0,.8);

    padding:4px 8px;

    border-radius:5px;

    font-size:13px;

}

.card h3{

    margin-top:12px;

    font-size:18px;

}

.card p{

    color:#9f9f9f;

    margin-top:5px;

    font-size:14px;

}

.thumb{

    width:100%;
    aspect-ratio:16/9;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #2a2a2a,
        #3d3d3d
    );

    position:relative;

    overflow:hidden;

}

.thumb img{

    width:100%;
    height:100%;

    object-fit:cover;

}

</style>

</head>

<link rel="icon" type="image/png" href="logo.png">

<body>

<div class="header">

    <div style="display:flex;align-items:center;gap:40px;">

        <a href="index.html" class="logo">
            C's Movies
        </a>

        <nav class="nav">

            <a href="index.html">🏠 Home</a>
            <a class="active" href="movies.html">🎬 Movies</a>
            <a href="shows.html">📺 Shows</a>

        </nav>

    </div>

    <input class="search" placeholder="🔎 Search movies">

</div>

<div class="container">

    <h1 class="page-title">🎬 Movies</h1>

    <p class="subtitle">
        Browse all movie content.
    </p>

    <div class="grid" id="videoGrid"></div>

</div>

<script>
    const cached = sessionStorage.getItem("videos");

    if (!cached) {
        window.location.href = "index.html";
    }

    const videos = JSON.parse(cached);

    const movies = videos.filter(v => v.category === "Movies");

    const grid = document.getElementById("videoGrid");

    function formatTime(seconds){
        seconds = Math.floor(seconds);

        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;

        if (hours > 0) {

            return `${hours}:${mins.toString().padStart(2,"0")}:${secs.toString().padStart(2,"0")}`;

        }

        return `${mins}:${secs.toString().padStart(2,"0")}`;
    }

    movies.forEach(movie => {

        const card = document.createElement("a");

        card.className = "card";
        card.href = `video.html?id=${movie.id}`;

        card.innerHTML = `

            <div class="thumb">

                <img src="${movie.thumbnail}" alt="${movie.title}">

                <div class="duration">
                    ${formatTime(movie.duration)}
                </div>

            </div>

            <h3>${movie.title}</h3>

            <p>${movie.genre} • ${movie.subgenre}</p>

        `;

        grid.appendChild(card);

    });

</script>
</body>
</html>
