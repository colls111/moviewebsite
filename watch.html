<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C's Movies</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#000;

    margin:0;

}

.player{

    position:fixed;

    inset:0;

    width:100vw;
    height:100vh;

    background:black;

    overflow:hidden;

}

video{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

}

.bottom{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    padding:16px 20px;

    background:linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.45),
        transparent
    );

    transition:opacity .3s;
    opacity:1;
}

.player.hide-ui .bottom{

    opacity:0;
    pointer-events:none;

}

.player.hide-ui{

    cursor:none;

}

.player:not(.hide-ui){

    cursor:default;

}

#progress{

    width:100%;
    margin-bottom:12px;

}

#captions{

    border-bottom:2px solid transparent;
    transition:
        transform .15s ease,
        color .15s ease,
        border-color .15s ease;

}

#captions.active{

    border-bottom-color:white;

}

.info{

    color:white;
    margin-bottom:10px;

}

.controls{

    display:grid;
    grid-template-columns:1fr auto 1fr;

    align-items:center;

}

.left,
.right{

    display:flex;
    align-items:center;
    gap:12px;

}

.right{

    justify-content:flex-end;

}

.center{

    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;

}

button{

    width:40px;
    height:40px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:none;
    border:none;

    color:white;
    font-size:32px;

    cursor:pointer;

    transition:
        transform .15s ease,
        color .15s ease;
}

button:hover{

    color:#d0d0d0;
    transform:scale(1.15);

}

.volume{

    position:relative;
    display:flex;
    align-items:center;

}

#volume{

    position:absolute;

    left:50%;
    bottom:75px;

    transform:translateX(-50%) rotate(-90deg);

    width:90px;

    opacity:0;
    pointer-events:none;

    transition:.2s;

}

.volume:hover #volume{

    opacity:1;
    pointer-events:auto;

}

.speed{

    position:relative;
    display:flex;
    align-items:center;

}

#speedSlider{

    position:absolute;

    left:50%;
    bottom:75px;

    transform:translateX(-50%) rotate(-90deg);

    width:90px;

    opacity:0;
    pointer-events:none;

    transition:.2s;

}

.speed:hover #speedSlider{

    opacity:1;
    pointer-events:auto;

}

#speedDisplay{

    position:absolute;

    right:55px;
    top:50%;

    transform:translateY(-50%);

    padding:5px 10px;

    border-radius:999px;

    background:rgba(20,20,20,.85);

    color:white;

    font-size:14px;

    opacity:0;

    transition:opacity .2s;

    pointer-events:none;

}

#speedDisplay.show{

    opacity:1;

}

.jump-container{

    position:relative;

}

.jump-popup{

    position:absolute;

    bottom:55px;
    right:0;

    display:flex;
    gap:8px;

    padding:8px;

    background:rgba(20,20,20,.95);

    border-radius:8px;

    opacity:0;
    pointer-events:none;

    transform:translateY(10px);

    transition:.2s;

}

.jump-popup.show{

    opacity:1;
    pointer-events:auto;

    transform:translateY(0);

}

.jump-popup input{

    width:70px;

    background:#2a2a2a;

    color:white;

    border:none;

    outline:none;

    padding:6px 8px;

    border-radius:6px;

    text-align:center;

}

.jump-popup button{

    width:auto;
    height:auto;

    padding:6px 12px;

    font-size:15px;

}

.back-btn{

    position:absolute;

    top:24px;
    left:24px;

    background:none;
    border:none;

    color:white;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    z-index:10;

    transition:
        opacity .3s,
        transform .15s,
        color .15s;

}

.back-btn:hover{

    color:#8db9ff;

    transform:scale(1.08);

}

.player.hide-ui .back-btn{

    opacity:0;
    pointer-events:none;

}

.center-icon{

    position:absolute;

    z-index:10;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%) scale(.8);

    font-size:90px;

    opacity:0;

    pointer-events:none;

    transition:
        opacity .25s ease,
        transform .25s ease;

}

.center-icon.show{

    opacity:1;

    transform:translate(-50%,-50%) scale(1);

}

</style>

</head>

<link rel="icon" type="image/png" href="favicon.png">

<body>

<div class="player">

<button id="back" class="back-btn">⬅️</button>

<video id="video"></video>

</video>

<div id="centerIcon" class="center-icon">▶️</div>

<div class="bottom">

<input id="progress" type="range" min="0" max="100" step="any" value="0">

<div class="info">

<span id="time">0:00 / 0:00</span>

</div>

<div class="controls">

<div class="left">

<button id="play">▶️</button>

<button id="rewind">⏪</button>

<button id="forward">⏩</button>

<div class="volume">

<button id="mute">🔊</button>

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<div id="videoTitle" class="center"></div>

<div class="right">

    <div class="speed">

        <button id="speed">🔄</button>

        <input
            id="speedSlider"
            type="range"
            min="0"
            max="11"
            step="1"
            value="3">

        <div id="speedDisplay">1×</div>

    </div>

    <div class="jump-container">

        <button id="jumpTime">🕒</button>

        <div id="jumpPopup" class="jump-popup">

            <input
                id="jumpInput"
                type="text"
                placeholder="0:45">

            <button id="jumpGo">Go</button>

        </div>

    </div>

    <button id="captions">💬</button>
    <button id="fullscreen">⏹️</button>

</div>

</div>

</div>

</div>

<script>

//CONSTANTS ------------------------
const video = document.getElementById("video");
const progress = document.getElementById("progress");
const fullscreen = document.getElementById("fullscreen");
const time = document.getElementById("time");

const player = document.querySelector(".player");

const play = document.getElementById("play");
const rewind = document.getElementById("rewind");
const forward = document.getElementById("forward");
const back = document.getElementById("back");

const mute = document.getElementById("mute");
const volume = document.getElementById("volume");

const jumpTime = document.getElementById("jumpTime");
const jumpPopup = document.getElementById("jumpPopup");
const jumpInput = document.getElementById("jumpInput");
const jumpGo = document.getElementById("jumpGo");

const centerIcon = document.getElementById("centerIcon");

const captions = document.getElementById("captions");

const speed = document.getElementById("speed");
const speedSlider = document.getElementById("speedSlider");
const speedDisplay = document.getElementById("speedDisplay");
const speeds = [
    0.25,
    0.5,
    0.75,
    1,
    1.25,
    1.5,
    1.75,
    2,
    2.25,
    2.5,
    2.75,
    3,
];

//VARIABLES ------------------------
const videos = JSON.parse(sessionStorage.getItem("videos"));
const id = new URLSearchParams(window.location.search).get("id");
const videop = videos.find(v => v.id === id);
const progressKey = `progress-${videop.id}`;

let lastVolume = 1;
let playbackSpeed = 1;
let hideTimer;
let captionsEnabled = false;
let speedTimer;

//INIT ------------------------
initPlayer();


//EVENT LISTENERS ------------------------
document.addEventListener("keydown", (e) => {

    showUI();

    if (e.target.tagName === "INPUT")
        return;


    switch (e.key.toLowerCase()) {

        // Play / Pause
        case " ":
        case "k":
            e.preventDefault();
            togglePlay();
            break;

        // Fullscreen
        case "f":
            e.preventDefault();
            toggleFullscreen();
            break;

        // Mute
        case "m":
            e.preventDefault();
            toggleMute();
            break;

        // Rewind 10s
        case "arrowleft":
            e.preventDefault();
            skip(-10)
            break;

        // Forward 10s
        case "arrowright":
            e.preventDefault();
            skip(10)
            break;

        // Volume Up
        case "arrowup":
            e.preventDefault();
            setVolume(video.volume + .05);
            break;

        // Volume Down
        case "arrowdown":
            e.preventDefault();
            setVolume(video.volume - .05);
            break;
    }
});

document.addEventListener("click",()=>{

    jumpPopup.classList.remove("show");
});

video.onloadedmetadata = loadProgress;

video.addEventListener("pause",()=>{

    clearTimeout(hideTimer);

    player.classList.remove("hide-ui");

});

video.addEventListener("ended", () => {
    localStorage.removeItem(progressKey);
});

video.ontimeupdate=()=>{

    progress.value = video.currentTime;

    time.textContent=
    `${format(video.currentTime)} / ${format(video.duration)}`;

}

video.addEventListener("pause", saveProgress);
video.addEventListener("play", showUI);
video.addEventListener("click", togglePlay);
video.addEventListener("dblclick", toggleFullscreen);

player.addEventListener("mousemove", showUI);
player.addEventListener("mouseenter", showUI);

progress.addEventListener("change", saveProgress);

window.addEventListener("beforeunload", saveProgress);

jumpInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        jumpToTime();
    }
});

//EVENT FUNCTIONS ------------------------
video.onplay=()=>play.textContent="⏸️";
video.onpause=()=>play.textContent="▶️";

play.onclick = togglePlay;
back.onclick = () => {window.location.href = "index.html";};
fullscreen.onclick=()=>toggleFullscreen();

progress.oninput = () => {
    video.currentTime = progress.value;
    saveProgress();
};

rewind.onclick = () => skip(-10);
forward.onclick = () => skip(10);

volume.oninput = () => setVolume(Number(volume.value));
mute.onclick = () => toggleMute();

speedSlider.oninput = () => {

    const index = Number(speedSlider.value);

    playbackSpeed = speeds[index];

    video.playbackRate = playbackSpeed;

    speedDisplay.textContent = `${playbackSpeed}×`;

    showSpeedDisplay();

    localStorage.setItem("player-speed", playbackSpeed);
};

captions.onclick = () => toggleCaptions();

jumpGo.onclick = jumpToTime;
jumpPopup.onclick = (e)=>{e.stopPropagation();};
jumpTime.onclick = (e) => {

    e.stopPropagation();

    jumpPopup.classList.toggle("show");

    if(jumpPopup.classList.contains("show")){

        jumpInput.focus();
        jumpInput.select();
    }
};

//FUNCTIONS ------------------------
function initPlayer() {

    if (!videop) {

        alert("Video not found.");
        window.location.href = "index.html";
        return;

    }

    document.getElementById("videoTitle").textContent = videop.title;
    document.title = videop.title;

    video.src = videop.video;
    video.load();

    loadVolume();
    loadPlaybackSpeed();

    video.play().catch(err => {
        console.log("Autoplay blocked", err);
    });
}

function togglePlay() {

    if (video.paused) {
        video.play();
        showCenterIcon("▶️");
    } else {
        video.pause();
        showCenterIcon("⏸️");
    }

    saveProgress();
}

function skip(seconds){

    video.currentTime = Math.min(
        video.duration,
        Math.max(0, video.currentTime + seconds)
    );

    saveProgress();
}

function jumpToTime() {

    const seconds = parseTime(jumpInput.value);

    if (seconds == null)
        return;

    video.currentTime = Math.min(
        Math.max(seconds, 0),
        video.duration
    );

    saveProgress();

    jumpPopup.classList.remove("show");
}

function showUI(){

    player.classList.remove("hide-ui");

    clearTimeout(hideTimer);

    if(!video.paused){

        hideTimer = setTimeout(()=>{

            player.classList.add("hide-ui");

        },2500);
    }
}

function showCenterIcon(icon){

    centerIcon.textContent = icon;

    centerIcon.classList.add("show");

    clearTimeout(centerIcon.timer);

    centerIcon.timer = setTimeout(()=>{

        centerIcon.classList.remove("show");

    },350);
}

function setVolume(value) {

    value = Math.max(0, Math.min(1, value));

    video.volume = value;
    video.muted = value === 0;

    volume.value = value;

    mute.textContent = value === 0 ? "🔇" : "🔊";

    if (value > 0) {
        lastVolume = value;
    }

    localStorage.setItem("player-volume", value);
}

function showSpeedDisplay() {

    speedDisplay.classList.add("show");

    clearTimeout(speedTimer);

    speedTimer = setTimeout(() => {

        speedDisplay.classList.remove("show");

    }, 800);

}

function toggleMute() {

    if (video.muted || video.volume === 0) {

        setVolume(lastVolume);
    } else {

        lastVolume = video.volume;
        setVolume(0);
    }
}

function toggleFullscreen(){

    if(document.fullscreenElement){
        document.exitFullscreen();
    }else{
        player.requestFullscreen();
    }
}

function toggleCaptions() {

    captionsEnabled = !captionsEnabled;
    
    captions.classList.toggle("active", captionsEnabled);
}

function saveProgress() {
    localStorage.setItem(progressKey, video.currentTime);
}

function loadVolume() {

    const savedVolume = localStorage.getItem("player-volume");

    if (savedVolume === null)
        return;

    const value = Number(savedVolume);

    setVolume(value);

    if (value > 0) {
        lastVolume = value;
    }
}

function loadPlaybackSpeed() {

    const saved = Number(localStorage.getItem("player-speed"));

    if (isNaN(saved))
        return;

    playbackSpeed = saved;

    video.playbackRate = playbackSpeed;

    speedSlider.value = speeds.indexOf(playbackSpeed);

    speedDisplay.textContent =
        `${playbackSpeed.toFixed(1)}×`;

}

function loadProgress() {

    progress.max = video.duration;

    const savedTime = Number(localStorage.getItem(progressKey));

    if (!isNaN(savedTime) && savedTime < video.duration - 10) {
        video.currentTime = savedTime;
    }
}

function format(seconds){

    if(isNaN(seconds)) return "0:00";

    const mins=Math.floor(seconds/60);

    const secs=Math.floor(seconds%60);

    return `${mins}:${secs.toString().padStart(2,"0")}`;

}

function parseTime(text){

    text = text.trim();

    const parts = text.split(":").map(Number);

    if(parts.some(isNaN))
        return null;

    if(parts.length == 1){

        return parts[0];

    }

    if(parts.length == 2){

        return parts[0] * 60 + parts[1];

    }

    if(parts.length == 3){

        return parts[0] * 3600 +
               parts[1] * 60 +
               parts[2];

    }
    return null;
}

setInterval(() => {

    if (!video.paused) {
        saveProgress();
    }

}, 15000);

</script>

</body>
</html>
