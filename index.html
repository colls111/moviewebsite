<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C's Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    color:white;
    min-height:100vh;

    background:
        radial-gradient(circle at 20% 0%,
            rgba(77,163,255,.20),
            transparent 55%),

        radial-gradient(circle at 80% 10%,
            rgba(60,100,220,.14),
            transparent 60%),

        linear-gradient(
            to bottom,
            #151c2c,
            #111827 35%,
            #090d16 100%
        );

    background-attachment:fixed;
}

.header{

    position:sticky;
    top:0;
    z-index:100;

    display:flex;
    align-items:center;
    gap:30px;

    padding:18px 40px;

    background:rgba(8,12,18,.92);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 8px 24px rgba(0,0,0,.30),
    0 1px 0 rgba(77,163,255,.08);
}

.header::after{
    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:-20px;

    height:20px;

    pointer-events:none;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.25),
        transparent
    );
}

.logo,
.logo:visited{

    color:white;

    text-decoration:none;

    font-size:28px;
    font-weight:bold;

    display:flex;
    align-items:center;
    gap:10px;

    transition:.2s;

}

.logo:hover{

    color:#8db9ff;

    transform:scale(1.03);

}

.card,
.card:visited{

    color:white;
    text-decoration:none;

}

.nav{
    display:flex;
    gap:30px;
}

.nav a{

    display:flex;
    align-items:center;
    gap:8px;

    color:white;

    text-decoration:none;

    font-size:19px;
    font-weight:bold;

    transition:.2s;

}

.nav a:hover{

    color:white;
    transform:scale(1.05);

}

.nav a.active{

    color:#8db9ff;

}
    
.search-box{

    display:flex;
    align-items:center;
    gap:12px;

    width:420px;

    padding:12px 18px;

    border-radius:999px;

    background:#151d2c;

    border:1px solid rgba(255,255,255,.06);
}

.search-box span{

    font-size:20px;
    opacity:.7;
}

.search{

    flex:1;

    background:none;
    border:none;
    outline:none;

    color:white;
    font-size:16px;
}

.search::placeholder{

    color:#7f8aa1;
}

.container{
    padding:20px 40px;
}

.hero{
    background:linear-gradient(to right,#111,#222);
    padding:40px;
    border-radius:18px;
    margin-bottom:35px;
}

.hero h1{
    font-size:36px;
    margin-bottom:10px;
}

.hero p{
    color:#bbb;
    margin-bottom:20px;
}

.watch-btn{
    display:inline-block;
    background:white;
    color:black;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.section-title{
    margin-bottom:16px;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:24px;
}

.card{
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.04);
}

.thumb{
    width:100%;
    aspect-ratio:16/9;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #2a2a2a,
        #3d3d3d
    );

    position:relative;
    overflow:hidden;
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.duration{
    position:absolute;
    right:8px;
    bottom:8px;
    background:rgba(0,0,0,.8);
    padding:4px 7px;
    border-radius:5px;
    font-size:13px;
}

.card h3{
    margin-top:12px;
    font-size:18px;
}

.continue-row{
    display:flex;
    gap:20px;
    overflow-x:auto;

    padding-top:8px;
    padding-bottom:12px;

    margin-bottom:40px;
}

.continue-row::-webkit-scrollbar{

    display:none;

}

.continue-row .card{

    flex:0 0 280px;

}

.progress-bar{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:4px;

    background:#444;

}

.progress-fill{

    height:100%;

    background:#4da3ff;

}

.slider-wrap{
    position:relative;
    margin-bottom:40px;
}

.continue-row{
    display:flex;
    gap:24px;
    overflow-x:auto;
    overflow-y:visible;

    padding:10px 4px 18px;

    scroll-behavior:smooth;
    scrollbar-width:none;
}

.continue-row::-webkit-scrollbar{
    display:none;
}

.continue-row .card{
    width:300px;
    flex:0 0 auto;
}

.slider-btn{
    position:absolute;
    top:45%;
    transform:translateY(-50%);
    z-index:5;

    width:42px;
    height:80px;

    border:none;
    border-radius:8px;

    background:rgba(0,0,0,.65);
    color:white;

    font-size:42px;
    cursor:pointer;

    opacity:0;
    transition:.2s;
}

.slider-wrap:hover .slider-btn{
    opacity:1;
}

.slider-btn.left{
    left:0;
}

.slider-btn.right{
    right:0;
}

.section-header{

    display:flex;
    align-items:center;
    gap:18px;

    margin-bottom:16px;

}

.section-title{

    margin:0;
    font-size:22px;
}

.clear-btn{

    background:none;
    border:none;

    color:#8db9ff;

    font:inherit;
    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    transition:.2s;

    padding:0;

}

.clear-btn:hover{

    color:white;

    transform:scale(1.05);

}

</style>
</head>

<link rel="icon" type="image/png" href="logo.png">

<body>

<div class="header">

    <div style="display:flex;align-items:center;gap:40px;">

        <a href="index.html" class="logo">
            <span>C's Movies</span>
        </a>

        <nav class="nav">

            <a class="active" href="#">🏠 Home</a>
            <a href="movies.html">🎬 Movies</a>
            <a href="shows.html">📺 Shows</a>
        
        </nav>

        <div class="search-box">
            <span>🔍</span>
            <input
                class="search"
                type="text"
                placeholder="Search genre, movies, etc...">
        </div>

    </div>

</div>

<div class="container">

    <div class="hero">
        <h1>Featured Video</h1>
        <p>How Much Does It Cost Dexter To Kill One Person?</p>
        <a class="watch-btn" href="watch.html?id=dexter-cost">▶ Watch Now</a>
    </div>

    <div class="section-header">

        <h2 class="section-title">
            Continue Watching
        </h2>

        <button class="clear-btn" onclick="clearContinueWatching()">
            🗑️ Clear
        </button>

    </div>

    <div class="slider-wrap">
        <button class="slider-btn left" onclick="scrollContinue(-1)">‹</button>

        <div class="continue-row" id="continueRow"></div>

        <button class="slider-btn right" onclick="scrollContinue(1)">›</button>
    </div>

    <h2 class="section-title">All Content</h2>

    <div class="grid" id="videoGrid"></div>

<script>

function formatTime(seconds){
        seconds = Math.floor(seconds);

        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;

        if (hours > 0) {

            return `${hours}:${mins.toString().padStart(2,"0")}:${secs.toString().padStart(2,"0")}`;

        }

        return `${mins}:${secs.toString().padStart(2,"0")}`;
    }

function loadContinueWatching(videos){

    const row =
        document.getElementById("continueRow");

    row.innerHTML = "";

    videos.forEach(video => {

        const progress = Number(
            localStorage.getItem(`progress-${video.id}`)
        );

        if(
            isNaN(progress) ||
            progress <= 60 ||
            progress >= video.duration - 600
        ){
            return;
        }

        const card = document.createElement("a");

        card.className = "card";

        card.href = `watch.html?id=${video.id}`;

        const percent =
            (progress / video.duration) * 100;

        card.innerHTML = `
            <div class="thumb">

                <img src="${video.thumbnail}">

                <div class="progress-bar">

                    <div
                        class="progress-fill"
                        style="width:${percent}%">
                    </div>

                </div>

            </div>

            <h3>${video.title}</h3>
        `;

        row.appendChild(card);

    });

}

function clearContinueWatching(){

    if(!confirm("Clear your Continue Watching list?")){
        return;
    }

    const videos =
        JSON.parse(sessionStorage.getItem("videos")) || [];

    videos.forEach(video => {
        localStorage.removeItem(`progress-${video.id}`);
    });

    loadContinueWatching(videos);

}

const cardWidth = document.querySelector(".grid .card")?.offsetWidth ?? 300;

document.querySelectorAll(".continue-row .card").forEach(card => {
    card.style.width = `${cardWidth}px`;
});

function scrollContinue(direction){
    const row = document.getElementById("continueRow");

    row.scrollBy({
        left: direction * 700,
        behavior: "smooth"
    });
}

const JSON_URL = "videos.json";

async function loadVideos() {

    const grid = document.getElementById("videoGrid");

    try {

        let videos;

        // Use cached videos if available
        const cached = sessionStorage.getItem("videos");

        if (cached) {

            videos = JSON.parse(cached);

            console.log("Loaded videos from cache.");

        } else {

            const response = await fetch(JSON_URL);
            videos = await response.json();

            // Save for the rest of the session
            sessionStorage.setItem(
                "videos",
                JSON.stringify(videos)
            );

            console.log("Downloaded videos from API.");

        }

        grid.innerHTML = "";

        videos.forEach(video => {

            const card = document.createElement("a");

            card.className = "card";

            card.href = `video.html?id=${video.id}`;

            card.innerHTML = `

                <div class="thumb">

                    ${
                        video.thumbnail
                        ? `<img src="${video.thumbnail}" alt="${video.title}">`
                        : ""
                    }

                    <div class="duration">
                        ${formatTime(video.duration)}
                    </div>

                </div>

                <h3>${video.title}</h3>

            `;

            grid.appendChild(card);
        });
        loadContinueWatching(videos);
    }

    catch (err) {

        console.error(err);

        grid.innerHTML = "<p>Failed to load videos.</p>";

    }
}

loadVideos();
</script>

</div>

</body>
</html>
