<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C's Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
}

.header{
    padding:24px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo,
.logo:visited{

    color:white;

    text-decoration:none;

    font-size:28px;
    font-weight:bold;

    display:flex;
    align-items:center;
    gap:10px;

    transition:.2s;

}

.logo:hover{

    color:#8db9ff;

    transform:scale(1.03);

}

.card,
.card:visited{

    color:white;
    text-decoration:none;

}

.nav{
    display:flex;
    gap:30px;
}

.nav a{

    display:flex;
    align-items:center;
    gap:8px;

    color:white;

    text-decoration:none;

    font-size:19px;
    font-weight:bold;

    transition:.2s;

}

.nav a:hover{

    color:white;
    transform:scale(1.05);

}

.nav a.active{

    color:#8db9ff;

}
    
.search{
    background:#151515;
    border:1px solid #333;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    outline:none;
}

.container{
    padding:20px 40px;
}

.hero{
    background:linear-gradient(to right,#111,#222);
    padding:40px;
    border-radius:18px;
    margin-bottom:35px;
}

.hero h1{
    font-size:36px;
    margin-bottom:10px;
}

.hero p{
    color:#bbb;
    margin-bottom:20px;
}

.watch-btn{
    display:inline-block;
    background:white;
    color:black;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.section-title{
    margin-bottom:16px;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:22px;
}

.card{
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.04);
}

.thumb{

    height:125px;

    background:linear-gradient(
        135deg,
        #2a2a2a,
        #3a3a3a
    );

    border-radius:12px;

    position:relative;

    overflow:hidden;

    transition:.2s;

}

.card:hover .thumb{

    transform:scale(1.03);

}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.duration{
    position:absolute;
    right:8px;
    bottom:8px;
    background:rgba(0,0,0,.8);
    padding:4px 7px;
    border-radius:5px;
    font-size:13px;
}

.card h3{
    font-size:16px;
    margin-top:10px;
}

.continue-row{

    display:flex;
    gap:20px;

    overflow-x:auto;

    padding-bottom:12px;

    margin-bottom:40px;

    scrollbar-width:none;

}

.continue-row::-webkit-scrollbar{

    display:none;

}

.continue-row .card{

    width:260px;
    flex-shrink:0;

}

.progress-bar{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:4px;

    background:#444;

}

.progress-fill{

    height:100%;

    background:#4da3ff;

}

</style>
</head>

<link rel="icon" type="image/png" href="favicon.png">

<body>

<div class="header">

    <div style="display:flex;align-items:center;gap:40px;">

        <a href="index.html" class="logo">

            🎬 C's Movies

        </a>

        <nav class="nav">

            <a class="active" href="#">🏠 Home</a>
            <a href="movies.html">🎬 Movies</a>
            <a href="shows.html">📺 Shows</a>
        
        </nav>

    </div>

    <input class="search" placeholder="🔎 Search content">

</div>

<div class="container">

    <div class="hero">
        <h1>Featured Video</h1>
        <p>How Much Does It Cost Dexter To Kill One Person?</p>
        <a class="watch-btn" href="watch.html?id=dexter-cost">▶ Watch Now</a>
    </div>

    <h2 class="section-title">Continue Watching</h2>

    <div class="continue-row" id="continueRow"></div>

    <h2 class="section-title">All Content</h2>

    <div class="grid" id="videoGrid"></div>

<script>

function formatTime(seconds){

    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;

    return `${mins}:${secs.toString().padStart(2,"0")}`;

}

function loadContinueWatching(videos){

    const row =
        document.getElementById("continueRow");

    row.innerHTML = "";

    videos.forEach(video => {

        const progress = Number(
            localStorage.getItem(`progress-${video.id}`)
        );

        if(
            isNaN(progress) ||
            progress <= 10 ||
            progress >= video.duration - 10
        ){
            return;
        }

        const card = document.createElement("a");

        card.className = "card";

        card.href = `watch.html?id=${video.id}`;

        const percent =
            (progress / video.duration) * 100;

        card.innerHTML = `
            <div class="thumb">

                <img src="${video.thumbnail}">

                <div class="progress-bar">

                    <div
                        class="progress-fill"
                        style="width:${percent}%">
                    </div>

                </div>

            </div>

            <h3>${video.title}</h3>
        `;

        row.appendChild(card);

    });

}

const API_URL = "https://colls112.pythonanywhere.com/api/videos";

async function loadVideos() {

    const grid = document.getElementById("videoGrid");

    try {

        let videos;

        // Use cached videos if available
        const cached = sessionStorage.getItem("videos");

        if (cached) {

            videos = JSON.parse(cached);

            console.log("Loaded videos from cache.");

        } else {

            const response = await fetch(API_URL);

            videos = await response.json();

            // Save for the rest of the session
            sessionStorage.setItem(
                "videos",
                JSON.stringify(videos)
            );

            console.log("Downloaded videos from API.");

        }

        grid.innerHTML = "";

        videos.forEach(video => {

            const card = document.createElement("a");

            card.className = "card";

            card.href = `video.html?id=${video.id}`;

            card.innerHTML = `

                <div class="thumb">

                    ${
                        video.thumbnail
                        ? `<img src="${video.thumbnail}" alt="${video.title}">`
                        : ""
                    }

                    <div class="duration">
                        ${formatTime(video.duration)}
                    </div>

                </div>

                <h3>${video.title}</h3>

            `;

            grid.appendChild(card);
            loadContinueWatching(videos);
        });
        
    }

    catch (err) {

        console.error(err);

        grid.innerHTML = "<p>Failed to load videos.</p>";

    }
}

loadVideos();
</script>

</div>

</body>
</html>
