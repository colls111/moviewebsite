<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:1000px;
    max-width:95%;
    background:black;
}

video{
    width:100%;
    display:block;
}

.bottom{

    background:linear-gradient(to top,#111,#1a1a1a);

    padding:10px 18px;

}

#progress{

    width:100%;
    margin-bottom:12px;

}

.info{

    color:white;
    margin-bottom:10px;

}

.controls{

    display:grid;
    grid-template-columns:1fr auto 1fr;

    align-items:center;

}

.left,
.right{

    display:flex;
    align-items:center;
    gap:12px;

}

.right{

    justify-content:flex-end;

}

.center{

    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;

}

button{

    background:none;
    border:none;

    color:white;
    font-size:22px;

    cursor:pointer;

}

button:hover{

    color:#d0d0d0;

}

.volume{

    position:relative;
    display:flex;
    align-items:center;

}

#volume{

    position:absolute;

    left:50%;
    bottom:60px;

    transform:translateX(-50%) rotate(-90deg);

    width:90px;

    opacity:0;
    pointer-events:none;

    transition:.2s;

}

.volume:hover #volume{

    opacity:1;
    pointer-events:auto;

}

</style>

</head>

<body>

<div class="player">

<video id="video">

<source src="https://pub-523e44f7b37f47d29adcb674f8063b59.r2.dev/How%20Much%20Does%20It%20Cost%20Dexter%20To%20Kill%20One%20Person.mp4">

</video>

<div class="bottom">

<input id="progress" type="range" min="0" max="100" value="0">

<div class="info">

<span id="time">0:00 / 0:00</span>

</div>

<div class="controls">

<div class="left">

<button id="play">▶</button>

<button id="rewind">⏪</button>

<button id="forward">⏩</button>

<div class="volume">

<button id="mute">🔊</button>

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<div class="center">

How Much Does It Cost Dexter To Kill One Person?

</div>

<div class="right">

<button id="captions">CC</button>

<button id="fullscreen">⛶</button>

</div>

</div>

</div>

</div>

<script>

const video = document.getElementById("video");

const play = document.getElementById("play");
const rewind = document.getElementById("rewind");
const forward = document.getElementById("forward");

const progress = document.getElementById("progress");

const mute = document.getElementById("mute");
const volume = document.getElementById("volume");

const fullscreen = document.getElementById("fullscreen");

const time = document.getElementById("time");

function format(seconds){

    if(isNaN(seconds)) return "0:00";

    const mins=Math.floor(seconds/60);

    const secs=Math.floor(seconds%60);

    return `${mins}:${secs.toString().padStart(2,"0")}`;

}

play.onclick=()=>{

    if(video.paused){

        video.play();

    }else{

        video.pause();

    }

}

video.onplay=()=>play.textContent="⏸";
video.onpause=()=>play.textContent="▶";

rewind.onclick=()=>{

    video.currentTime=Math.max(0,video.currentTime-10);

}

forward.onclick=()=>{

    video.currentTime=Math.min(video.duration,video.currentTime+10);

}

video.ontimeupdate=()=>{

    progress.value=(video.currentTime/video.duration)*100;

    time.textContent=
    `${format(video.currentTime)} / ${format(video.duration)}`;

}

progress.oninput=()=>{

    video.currentTime=
    (progress.value/100)*video.duration;

}

volume.oninput=()=>{

    video.volume=volume.value;

}

mute.onclick=()=>{

    video.muted=!video.muted;

    mute.textContent=
    video.muted ? "🔇" : "🔊";

}

fullscreen.onclick=()=>{

    if(!document.fullscreenElement){

        document.querySelector(".player").requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}

document.getElementById("captions").onclick=()=>{

    alert("Captions coming soon.");

}

</script>

</body>
</html>
