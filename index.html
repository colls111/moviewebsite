<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:1000px;
    max-width:95%;
    background:black;
    position:relative;
}

video{
    width:100%;
    display:block;
}

.bottom{
    background:linear-gradient(to top, rgba(17,17,17,0.75), rgba(26,26,26,0.65));
    padding:10px 18px;
    transition: opacity 0.4s ease;
    opacity: 1;
}

.info{
    color:white;
    margin-bottom:10px;
}

.controls{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
}

.left,
.right{
    display:flex;
    align-items:center;
    gap:12px;
}

.right{
    justify-content:flex-end;
}

.center{
    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}

button{
    width:40px;
    height:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:none;
    border:none;
    color:white;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    color:#d0d0d0;
}

.volume{
    position:relative;
    display:flex;
    align-items:center;
}

#volume{
    position:absolute;
    left:50%;
    bottom:65px;
    transform:translateX(-50%) rotate(-90deg);
    width:90px;
    opacity:0;
    pointer-events:none;
    transition:.2s;
}

.volume:hover #volume{
    opacity:1;
    pointer-events:auto;
}

/* Fade support for hidden state */
.bottom.hidden {
    opacity: 0;
    pointer-events: none;
}

/* Fullscreen adjustments */
.player:-webkit-full-screen,
.player:fullscreen {
    width: 100% !important;
    height: 100% !important;
    max-width: none;
}

</style>

</head>

<body>

<div class="player" id="player">

<video id="video">
<source src="https://pub-523e44f7b37f47d29adcb674f8063b59.r2.dev/How%20Much%20Does%20It%20Cost%20Dexter%20To%20Kill%20One%20Person.mp4">
</video>

<div class="bottom" id="bottom">
<input id="progress" type="range" min="0" max="100" value="0">

<div class="info">
<span id="time">0:00 / 0:00</span>
</div>

<div class="controls">
<div class="left">
<button id="play">▶</button>
<button id="rewind">⏪</button>
<button id="forward">⏩</button>
<div class="volume">
<button id="mute">🔊</button>
<input id="volume" type="range" min="0" max="1" step="0.01" value="1">
</div>
</div>

<div class="center">
How Much Does It Cost Dexter To Kill One Person?
</div>

<div class="right">
<button id="captions">
<svg width="26" height="26" viewBox="0 0 24 24" fill="white">
<path d="M21 4H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm-8 9H9v-2h4v2Zm6 0h-4v-2h4v2Z"/>
</svg>
</button>
<button id="fullscreen">⛶</button>
</div>
</div>
</div>

</div>

<script>

const player = document.getElementById("player");
const video = document.getElementById("video");
const bottom = document.getElementById("bottom");

const play = document.getElementById("play");
const rewind = document.getElementById("rewind");
const forward = document.getElementById("forward");

const progress = document.getElementById("progress");

const mute = document.getElementById("mute");
const volumeSlider = document.getElementById("volume");

const fullscreenBtn = document.getElementById("fullscreen");

const timeDisplay = document.getElementById("time");

let hideTimeout;
let lastVolume = 1;
let isIdleHidden = false;

// Show controls
function showControls() {
    bottom.classList.remove("hidden");
    isIdleHidden = false;
    resetHideTimeout();
}

// Hide controls
function hideControls() {
    if (!video.paused) {
        bottom.classList.add("hidden");
        isIdleHidden = true;
    }
}

function resetHideTimeout() {
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(hideControls, 3000); // 3 seconds inactivity
}

// Keyboard controls
document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;

    switch (e.key.toLowerCase()) {
        case " ":
        case "k":
            e.preventDefault();
            if (video.paused) video.play();
            else video.pause();
            showControls();
            break;

        case "f":
            e.preventDefault();
            toggleFullscreen();
            showControls();
            break;

        case "m":
            e.preventDefault();
            toggleMute();
            // Hide volume slider popup when muting via keyboard
            volumeSlider.style.opacity = "0";
            volumeSlider.style.pointerEvents = "none";
            showControls();
            break;

        case "arrowleft":
            e.preventDefault();
            video.currentTime = Math.max(0, video.currentTime - 10);
            showControls();
            break;

        case "arrowright":
            e.preventDefault();
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
            showControls();
            break;

        case "arrowup":
            e.preventDefault();
            video.volume = Math.min(1, video.volume + 0.05);
            volumeSlider.value = video.volume;
            showControls();
            break;

        case "arrowdown":
            e.preventDefault();
            video.volume = Math.max(0, video.volume - 0.05);
            volumeSlider.value = video.volume;
            showControls();
            break;
    }
});

// Mouse activity on player
player.addEventListener("mousemove", () => {
    showControls();
});

player.addEventListener("mouseleave", () => {
    if (!video.paused) {
        hideControls();
    }
});

// Click to play/pause also shows UI
video.addEventListener("click", () => {
    if (video.paused) video.play();
    else video.pause();
    showControls();
});

video.addEventListener("dblclick", () => {
    toggleFullscreen();
    showControls();
});

// Fullscreen
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        player.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}

fullscreenBtn.onclick = toggleFullscreen;

// Volume hover still works, but keyboard mute forces it off
volumeSlider.oninput = () => {
    video.volume = parseFloat(volumeSlider.value);
    video.muted = video.volume === 0;
    mute.textContent = video.volume === 0 ? "🔇" : "🔊";
};

mute.onclick = () => {
    if (!video.muted && video.volume > 0) {
        lastVolume = video.volume;
        video.muted = true;
        video.volume = 0;
        volumeSlider.value = 0;
        mute.textContent = "🔇";
    } else {
        video.muted = false;
        video.volume = lastVolume || 1;
        volumeSlider.value = video.volume;
        mute.textContent = "🔊";
    }
    showControls();
};

function toggleMute() {
    if (!video.muted && video.volume > 0) {
        lastVolume = video.volume;
        video.muted = true;
        video.volume = 0;
        volumeSlider.value = 0;
        mute.textContent = "🔇";
    } else {
        video.muted = false;
        video.volume = lastVolume || 1;
        volumeSlider.value = video.volume;
        mute.textContent = "🔊";
    }
}

// Playback controls
play.onclick = () => {
    if (video.paused) video.play();
    else video.pause();
    showControls();
};

video.onplay = () => play.textContent = "⏸";
video.onpause = () => play.textContent = "▶";

rewind.onclick = () => {
    video.currentTime = Math.max(0, video.currentTime - 10);
    showControls();
};

forward.onclick = () => {
    video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
    showControls();
};

// Progress
progress.oninput = () => {
    if (video.duration) {
        video.currentTime = (progress.value / 100) * video.duration;
    }
};

video.ontimeupdate = () => {
    if (video.duration) {
        progress.value = (video.currentTime / video.duration) * 100;
        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
};

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, "0")}`;
}

// Captions placeholder
document.getElementById("captions").onclick = () => {
    alert("Captions coming soon.");
};

// Initial setup
video.volume = 1;
showControls();

// Keyboard focus handling
player.setAttribute("tabindex", "0");

// Fullscreen change handler (ensure UI stays consistent)
document.addEventListener("fullscreenchange", () => {
    showControls();
});

</script>

</body>
</html>
