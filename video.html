<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C's Movies</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:white;
}

.header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:24px 40px;

    border-bottom:1px solid #1a1a1a;

}

.logo{

    font-size:28px;
    font-weight:bold;

    color:white;

    text-decoration:none;

    display:flex;
    align-items:center;
    gap:10px;

}

.logo,
.logo:visited{

    color:white;
    text-decoration:none;

}

.logo:hover{

    color:#8db9ff;
    transform:scale(1.03);

}

.back{

    color:#8db9ff;
    text-decoration:none;
    font-weight:bold;

}

.container{

    max-width:1200px;

    margin:40px auto;

    padding:0 30px;

}

.layout{

    display:grid;
    grid-template-columns:700px 1fr;

    gap:40px;

}

.thumbnail{

    width:100%;
    aspect-ratio:16/9;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #2a2a2a,
        #3d3d3d
    );

}

.title{

    font-size:34px;
    font-weight:bold;

    margin-bottom:18px;

}

.meta{

    color:#9f9f9f;

    margin-bottom:24px;

}

.description{

    color:#d4d4d4;

    line-height:1.6;

    margin-bottom:35px;

}

.watch{

    display:inline-block;

    background:#4da3ff;

    color:white;

    text-decoration:none;

    font-weight:bold;

    padding:14px 24px;

    border-radius:10px;

    transition:.2s;

}

.watch:hover{

    transform:scale(1.05);

}

.grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

}

.card{

    cursor:pointer;

}

.card:hover{

    transform:scale(1.03);

}

.thumb{

    width:100%;

    aspect-ratio:16/9;

    border-radius:12px;

    background:#2d2d2d;

    margin-bottom:10px;

}

.card p{

    font-weight:bold;

}

</style>

</head>

<link rel="icon" type="image/png" href="favicon.png">

<body>

<div class="header">

    <a href="index.html" class="logo">

        🎬 C's Movies

    </a>

</div>

<div class="container">

    <div class="layout">

        <div id="thumbnail" class="thumbnail"></div>

        <div>

            <div id="title" class="title"></div>

            <div id="meta" class="meta"></div>

            <div id="description" class="description"></div>

            <a id="watch" class="watch">
                ▶ Watch Now
            </a>

        </div>

    </div>

</div>

<script>
    const videos = JSON.parse(sessionStorage.getItem("videos")) || [];

    const id = new URLSearchParams(window.location.search).get("id");

    const videop = videos.find(v => v.id === id);

    if (!videop) {

        alert("Video not found.");
        window.location.href = "index.html";

    }

    function formatTime(seconds){

        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;

        return `${mins}:${secs.toString().padStart(2,"0")}`;

    }

    document.title = videop.title;

    document.getElementById("title").textContent =
        videop.title;

    document.getElementById("meta").textContent =
        `${videop.category === "Shows" ? "📺 Show" : "🎬 Movie"} • 🕒 ${formatTime(videop.duration)} • 📅 ${videop.date}`;

    document.getElementById("description").textContent =
        videop.description;

    document.getElementById("watch").href =
        `watch.html?id=${videop.id}`;

    const thumbnail = document.getElementById("thumbnail");

    thumbnail.style.backgroundImage =
        `url("${videop.thumbnail}")`;

    thumbnail.style.backgroundSize = "cover";
    thumbnail.style.backgroundPosition = "center";

</script>
</body>
</html>
