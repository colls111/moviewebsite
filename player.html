<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:1000px;
    max-width:95%;
    background:black;
    position:relative;
    overflow:hidden;
}

video{
    width:100%;
    display:block;
}

.bottom{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    padding:16px 20px;

    background:linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.45),
        transparent
    );

    transition:opacity .3s;

    opacity:1;

}

.player.hide-ui .bottom{

    opacity:0;
    pointer-events:none;

}

.player.hide-ui{

    cursor:none;

}

.player:not(.hide-ui){

    cursor:default;

}

#progress{

    width:100%;
    margin-bottom:12px;

}

#captions{

    border-bottom:2px solid transparent;
    transition:
        transform .15s ease,
        color .15s ease,
        border-color .15s ease;

}

#captions.active{

    border-bottom-color:white;

}

.info{

    color:white;
    margin-bottom:10px;

}

.controls{

    display:grid;
    grid-template-columns:1fr auto 1fr;

    align-items:center;

}

.left,
.right{

    display:flex;
    align-items:center;
    gap:12px;

}

.right{

    justify-content:flex-end;

}

.center{

    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;

}

button{

    width:40px;
    height:40px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:none;
    border:none;

    color:white;
    font-size:22px;

    cursor:pointer;

    transition:
        transform .15s ease,
        color .15s ease;
}

button:hover{

    color:#d0d0d0;
    transform:scale(1.15);

}

.volume{

    position:relative;
    display:flex;
    align-items:center;

}

#volume{

    position:absolute;

    left:50%;
    bottom:75px;

    transform:translateX(-50%) rotate(-90deg);

    width:90px;

    opacity:0;
    pointer-events:none;

    transition:.2s;

}

.volume:hover #volume{

    opacity:1;
    pointer-events:auto;

}

.jump-container{

    position:relative;

}

.jump-popup{

    position:absolute;

    bottom:55px;
    right:0;

    display:flex;
    gap:8px;

    padding:8px;

    background:rgba(20,20,20,.95);

    border-radius:8px;

    opacity:0;
    pointer-events:none;

    transform:translateY(10px);

    transition:.2s;

}

.jump-popup.show{

    opacity:1;
    pointer-events:auto;

    transform:translateY(0);

}

.jump-popup input{

    width:70px;

    background:#2a2a2a;

    color:white;

    border:none;

    outline:none;

    padding:6px 8px;

    border-radius:6px;

    text-align:center;

}

.jump-popup button{

    width:auto;
    height:auto;

    padding:6px 12px;

    font-size:15px;

}

</style>

</head>

<body>

<div class="player">

<video id="video">

<source src="https://pub-523e44f7b37f47d29adcb674f8063b59.r2.dev/How%20Much%20Does%20It%20Cost%20Dexter%20To%20Kill%20One%20Person.mp4">

</video>

<div class="bottom">

<input id="progress" type="range" min="0" max="100" step="any" value="0">

<div class="info">

<span id="time">0:00 / 0:00</span>

</div>

<div class="controls">

<div class="left">

<button id="play">▶️</button>

<button id="rewind">⏪</button>

<button id="forward">⏩</button>

<div class="volume">

<button id="mute">🔊</button>

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<div class="center">

How Much Does It Cost Dexter To Kill One Person?

</div>

<div class="right">

    <div class="jump-container">

        <button id="jumpTime">🕒</button>

        <div id="jumpPopup" class="jump-popup">

            <input
                id="jumpInput"
                type="text"
                placeholder="0:45">

            <button id="jumpGo">Go</button>

        </div>

    </div>

    <button id="captions">CC</button>
    
    <button id="fullscreen">⛶</button>

</div>

</div>

</div>

</div>

<script>

document.addEventListener("keydown", (e) => {

    showUI();

    // Ignore shortcuts while typing in an input
    if (e.target.tagName === "INPUT")
        return;


    switch (e.key.toLowerCase()) {

        // Play / Pause
        case " ":
        case "k":
            e.preventDefault();

            if (video.paused)
                video.play();
            else
                video.pause();

            break;

        // Fullscreen
        case "f":
            e.preventDefault();

            if (!document.fullscreenElement)
                document.querySelector(".player").requestFullscreen();
            else
                document.exitFullscreen();

            break;

        // Mute
        case "m":
            e.preventDefault();
            mute.click();
            break;

        // Rewind 10s
        case "arrowleft":
            e.preventDefault();
            video.currentTime = Math.max(0, video.currentTime - 10);
            break;

        // Forward 10s
        case "arrowright":
            e.preventDefault();
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
            break;

        // Volume Up
        case "arrowup":
            e.preventDefault();

            video.volume = Math.min(1, video.volume + 0.05);
            volume.value = video.volume;

            break;

        // Volume Down
        case "arrowdown":
            e.preventDefault();

            video.volume = Math.max(0, video.volume - 0.05);
            volume.value = video.volume;

            break;

    }

});

const video = document.getElementById("video");

const play = document.getElementById("play");
const rewind = document.getElementById("rewind");
const forward = document.getElementById("forward");

const progress = document.getElementById("progress");

const mute = document.getElementById("mute");
const volume = document.getElementById("volume");

const fullscreen = document.getElementById("fullscreen");

const time = document.getElementById("time");

const player = document.querySelector(".player");

const jumpTime = document.getElementById("jumpTime");
const jumpPopup = document.getElementById("jumpPopup");
const jumpInput = document.getElementById("jumpInput");
const jumpGo = document.getElementById("jumpGo");

let hideTimer;

function showUI(){

    player.classList.remove("hide-ui");

    clearTimeout(hideTimer);

    if(!video.paused){

        hideTimer = setTimeout(()=>{

            player.classList.add("hide-ui");

        },2500);

    }

}

function parseTime(text){

    text = text.trim();

    const parts = text.split(":").map(Number);

    if(parts.some(isNaN))
        return null;

    if(parts.length == 1){

        return parts[0];

    }

    if(parts.length == 2){

        return parts[0] * 60 + parts[1];

    }

    if(parts.length == 3){

        return parts[0] * 3600 +
               parts[1] * 60 +
               parts[2];

    }

    return null;

}

video.onloadedmetadata = () => {

    progress.max = video.duration;

};

player.addEventListener("mousemove",showUI);

player.addEventListener("mouseenter",showUI);

video.addEventListener("play",showUI);

video.addEventListener("pause",()=>{

    clearTimeout(hideTimer);

    player.classList.remove("hide-ui");

});

function format(seconds){

    if(isNaN(seconds)) return "0:00";

    const mins=Math.floor(seconds/60);

    const secs=Math.floor(seconds%60);

    return `${mins}:${secs.toString().padStart(2,"0")}`;

}

play.onclick=()=>{

    if(video.paused){

        video.play();

    }else{

        video.pause();

    }

}

video.onplay=()=>play.textContent="⏸️";
video.onpause=()=>play.textContent="▶️";

rewind.onclick=()=>{

    video.currentTime=Math.max(0,video.currentTime-10);

}

forward.onclick=()=>{

    video.currentTime=Math.min(video.duration,video.currentTime+10);

}

video.ontimeupdate=()=>{

    progress.value = video.currentTime;

    time.textContent=
    `${format(video.currentTime)} / ${format(video.duration)}`;

}

video.addEventListener("click", () => {

    if (video.paused)
        video.play();
    else
        video.pause();

});

video.addEventListener("dblclick", () => {

    if (!document.fullscreenElement)
        document.querySelector(".player").requestFullscreen();
    else
        document.exitFullscreen();

});

progress.oninput = () => {

    video.currentTime = progress.value;

}

volume.oninput = () => {

    video.volume = volume.value;
    video.muted = video.volume == 0;

    mute.textContent =
        video.volume == 0 ? "🔇" : "🔊";

};

let lastVolume = 1;

mute.onclick = () => {

    if (!video.muted && video.volume > 0) {

        lastVolume = video.volume;

        video.muted = true;
        video.volume = 0;
        volume.value = 0;

        mute.textContent = "🔇";

    } else {

        video.muted = false;
        video.volume = lastVolume;
        volume.value = lastVolume;

        mute.textContent = "🔊";

    }

};

fullscreen.onclick=()=>{

    if(!document.fullscreenElement){

        document.querySelector(".player").requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}

jumpInput.addEventListener("keydown",e=>{

    if(e.key == "Enter"){

        jumpGo.click();

    }

});

const captions = document.getElementById("captions");

let captionsEnabled = false;

captions.onclick = () => {

    captionsEnabled = !captionsEnabled;

    captions.classList.toggle("active", captionsEnabled);

    // Eventually turn subtitles on/off here

};

jumpTime.onclick = (e) => {

    e.stopPropagation();

    jumpPopup.classList.toggle("show");

    if(jumpPopup.classList.contains("show")){

        jumpInput.focus();
        jumpInput.select();

    }

};

jumpGo.onclick = () => {

    const seconds = parseTime(jumpInput.value);

    if(seconds == null){

        alert("Invalid time.");

        return;

    }

    video.currentTime = Math.min(
        Math.max(seconds,0),
        video.duration
    );

    jumpPopup.classList.remove("show");

};

document.addEventListener("click",()=>{

    jumpPopup.classList.remove("show");

});

jumpPopup.onclick = (e)=>{

    e.stopPropagation();

};

</script>

</body>
</html>
